<app-navbar />

@if (vm$ | async; as vm) {
  @if (vm.viewMode === 'table') {
    <app-planets-list
      [planets]="vm.planets"
      [sortDirection]="vm.sortDirection"
      (toggleSortRadius)="onToggleSortRadius()"
    />
  }

  @if (vm.viewMode === 'grid') {
    <app-planets-grid [planets]="vm.planets" />
  }
}
